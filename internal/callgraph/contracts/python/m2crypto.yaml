schema_version: "2"
ecosystem: python
library:
  name: m2crypto
  coordinates:
    - M2Crypto
  version_range: ">=0.40"
  description: "M2Crypto OpenSSL wrapper contracts for RSA, EVP, SSL, and X509 APIs"

contracts:
  - method: M2Crypto.RSA.gen_key
    arity: 2
    return: { type: M2Crypto.RSA.RSA, confidence: high }
    role: factory
  - method: M2Crypto.RSA.load_key
    arity: 1
    return: { type: M2Crypto.RSA.RSA, confidence: high }
    role: factory
  - method: M2Crypto.RSA.load_key_bio
    arity: 1
    return: { type: M2Crypto.RSA.RSA, confidence: high }
    role: factory
  - method: M2Crypto.RSA.load_key_string
    arity: 1
    return: { type: M2Crypto.RSA.RSA, confidence: high }
    role: factory
  - method: M2Crypto.RSA.load_pub_key
    arity: 1
    return: { type: M2Crypto.RSA.RSA_pub, confidence: high }
    role: factory
  - method: M2Crypto.RSA.new_pub_key
    arity: 1
    return: { type: M2Crypto.RSA.RSA_pub, confidence: high }
    role: factory
  - method: M2Crypto.EVP.MessageDigest
    arity: 1
    return: { type: M2Crypto.EVP.MessageDigest, confidence: high }
    role: factory
  - method: M2Crypto.EVP.MessageDigest.<init>
    arity: 1
    return: { type: M2Crypto.EVP.MessageDigest, confidence: high }
    role: factory
  - method: M2Crypto.EVP.MessageDigest.final
    arity: 0
    return: { type: builtins.bytes, confidence: high }
    role: output
  - method: M2Crypto.EVP.MessageDigest.digest
    arity: 0
    return: { type: builtins.bytes, confidence: high }
    role: output
  - method: M2Crypto.EVP.Cipher
    arity: 4
    return: { type: M2Crypto.EVP.Cipher, confidence: high }
    role: factory
  - method: M2Crypto.EVP.Cipher.<init>
    arity: 4
    return: { type: M2Crypto.EVP.Cipher, confidence: high }
    role: factory
  - method: M2Crypto.EVP.Cipher.update
    arity: 1
    return: { type: builtins.bytes, confidence: high }
    role: output
  - method: M2Crypto.EVP.HMAC
    arity: 1
    return: { type: M2Crypto.EVP.HMAC, confidence: high }
    role: factory
  - method: M2Crypto.EVP.HMAC.<init>
    arity: 1
    return: { type: M2Crypto.EVP.HMAC, confidence: high }
    role: factory
  - method: M2Crypto.EVP.HMAC.digest
    arity: 0
    return: { type: builtins.bytes, confidence: high }
    role: output
  - method: M2Crypto.SSL.Context
    arity: 1
    return: { type: M2Crypto.SSL.Context.Context, confidence: high }
    role: factory
  - method: M2Crypto.SSL.Context.Context.<init>
    arity: 1
    return: { type: M2Crypto.SSL.Context.Context, confidence: high }
    role: factory
  - method: M2Crypto.SSL.Connection
    arity: 1
    return: { type: M2Crypto.SSL.Connection.Connection, confidence: high }
    role: factory
  - method: M2Crypto.SSL.Connection.Connection.<init>
    arity: 1
    return: { type: M2Crypto.SSL.Connection.Connection, confidence: high }
    role: factory
  - method: M2Crypto.X509.load_cert
    arity: 1
    return: { type: M2Crypto.X509.X509, confidence: high }
    role: factory
  - method: M2Crypto.X509.load_cert_string
    arity: 1
    return: { type: M2Crypto.X509.X509, confidence: high }
    role: factory

hierarchy:
  M2Crypto.RSA.RSA_pub:
    - M2Crypto.RSA.RSA
  M2Crypto.RSA.RSA:
    - builtins.object
  M2Crypto.EVP.MessageDigest:
    - builtins.object
  M2Crypto.EVP.Cipher:
    - builtins.object
  M2Crypto.EVP.HMAC:
    - builtins.object
  M2Crypto.SSL.Context.Context:
    - builtins.object
  M2Crypto.SSL.Connection.Connection:
    - builtins.object
  M2Crypto.X509.X509:
    - builtins.object
  builtins.bytes:
    - builtins.object
  builtins.object: []
