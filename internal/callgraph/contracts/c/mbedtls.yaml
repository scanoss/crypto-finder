    role: config
    parameters:
      - index: 2
        name: buflen
        role: metadata-contributing
        contributes: {property: dataLength, derivation: argument_value}
  - method: mbedtls_x509_crt_parse_der
    arity: 3
    return: {type: int, confidence: high}
    role: config
