    role: factory
  - method: EVP_sha1
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha224
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha256
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha384
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha512
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha3_224
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha3_256
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
    role: factory
  - method: EVP_sha3_384
    arity: 0
    return: {type: "const EVP_MD*", confidence: high}
