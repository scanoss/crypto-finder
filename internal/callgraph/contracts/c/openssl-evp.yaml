        name: parameter
        role: metadata-contributing
        contributes: {property: parameterSet, derivation: argument_value}
  - method: EVP_KEM_fetch
    arity: 3
    return: {type: "EVP_KEM*", confidence: high}
    role: factory
    parameters:
