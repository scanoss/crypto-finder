    return: {type: "const EVP_CIPHER*", confidence: high}
    role: factory
  - method: EVP_aes_192_cfb
    arity: 0
    return: {type: "const EVP_CIPHER*", confidence: high}
    role: factory
  - method: EVP_aes_192_gcm
    arity: 0
    return: {type: "const EVP_CIPHER*", confidence: high}
