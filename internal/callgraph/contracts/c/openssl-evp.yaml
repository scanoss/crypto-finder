        name: count
        role: metadata-contributing
        contributes: {property: dataLength, derivation: argument_value}
  - method: EVP_DigestFinal_ex
    arity: 3
    return: {type: "int", confidence: high}
    role: operation
  - method: EVP_DigestFinalXOF
    arity: 3
    return: {type: "int", confidence: high}
    role: operation
    parameters:
      - index: 2
