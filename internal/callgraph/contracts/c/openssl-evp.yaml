    role: factory
  - method: EVP_aes_256_ecb
    arity: 0
    return: {type: "const EVP_CIPHER*", confidence: high}
    role: factory
  - method: EVP_aes_256_cfb
    arity: 0
    return: {type: "const EVP_CIPHER*", confidence: high}
    role: factory
  - method: EVP_aes_256_gcm
    arity: 0
    return: {type: "const EVP_CIPHER*", confidence: high}
    role: factory
  - method: EVP_aes_256_ofb
