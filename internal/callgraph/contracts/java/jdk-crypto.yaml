  # Cipher.unwrap — argument-conditional on arg[2] (the wrap mode constant)
  - method: javax.crypto.Cipher.unwrap
    arity: 3
    when:
      arg_index: 2
      arg_value_in:
        - "javax.crypto.Cipher.SECRET_KEY"
        - "Cipher.SECRET_KEY"
        - "3"
    return:
      type: javax.crypto.SecretKey
      confidence: high

  - method: javax.crypto.Cipher.unwrap
    arity: 3
    when:
      arg_index: 2
      arg_value_in:
        - "javax.crypto.Cipher.PRIVATE_KEY"
        - "Cipher.PRIVATE_KEY"
        - "2"
    return:
      type: java.security.PrivateKey
      confidence: high

  - method: javax.crypto.Cipher.unwrap
    arity: 3
    when:
      arg_index: 2
      arg_value_in:
        - "javax.crypto.Cipher.PUBLIC_KEY"
        - "Cipher.PUBLIC_KEY"
        - "1"
    return:
      type: java.security.PublicKey
      confidence: high

  - method: javax.crypto.Cipher.wrap
    arity: 1
    return:
      type: byte[]
      confidence: high

