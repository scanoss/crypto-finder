schema_version: "2"
ecosystem: java

library:
  name: apache-sshd
  coordinates:
    - "org.apache.sshd:sshd-core"
    - "org.apache.sshd:sshd-common"
  version_range: ">=2,<3"
  description: "Apache MINA SSHD factory contracts for key, cipher, MAC, and fingerprint flows"

contracts:
