schema_version: "2"
ecosystem: java

library:
  name: password4j
  coordinates:
    - "com.password4j:password4j"
  version_range: ">=1.0,<2.0"
  description: "Password4J password hashing fluent API contracts"

contracts:
  - method: com.password4j.Password.hash
    arity: 1
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.Password.check
    arity: 2
    return:
      type: com.password4j.HashChecker
      confidence: high

  - method: com.password4j.HashBuilder.addPepper
    arity: 0
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.HashBuilder.addPepper
    arity: 1
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.HashBuilder.addRandomSalt
    arity: 0
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.HashBuilder.addRandomSalt
    arity: 1
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.HashBuilder.addSalt
    arity: 1
    return:
      type: com.password4j.HashBuilder
      confidence: high

  - method: com.password4j.HashBuilder.with
    arity: 1
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withArgon2
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withBcrypt
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withPBKDF2
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withCompressedPBKDF2
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withScrypt
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashBuilder.withMessageDigest
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

  - method: com.password4j.HashUpdate.getHash
    arity: 0
    return:
      type: com.password4j.Hash
      confidence: high

hierarchy:
  com.password4j.HashBuilder:
    - java.lang.Object
  com.password4j.HashChecker:
    - java.lang.Object
  com.password4j.Hash:
    - java.lang.Object
  com.password4j.HashUpdate:
    - java.lang.Object
  java.lang.Object: []
